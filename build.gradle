plugins {
    id 'java-library'
}

repositories {
    mavenCentral()
}

dependencies {
}

javadoc {
    source = sourceSets.main.allJava
    destinationDir = file("/docs")
    options {
        showFromPublic()
        quiet()
    }
    
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}