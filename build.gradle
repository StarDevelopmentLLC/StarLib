plugins {
    id 'java-library'
}

repositories {
    mavenCentral()
}

dependencies {
}

group = "com.stardevllc"
version = "1.0.0-SNAPSHOT"

javadoc {
    source = sourceSets.main.allJava
    destinationDir = file("/docs")
    options {
        showFromPublic()
        quiet()
    }
}

tasks.withType(Javadoc).configureEach {
    failOnError false
    options.quiet()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    
    withJavadocJar()
    withSourcesJar()
}