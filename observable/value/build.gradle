plugins {
    id 'java-library'
    id 'maven-publish'
}

apply from: rootProject.file('buildSrc/shared.gradle')

repositories {
    mavenCentral()
}

jar {
    archiveBaseName.set(rootProject.name + '-observable-value')
    destinationDirectory.set(file("$rootProject.projectDir/build/libs"))
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            artifactId = 'observable-value'
        }
    }
}

dependencies {
    api project(':helper')
    api project(':numbers')
    api project(':observable:base')
}